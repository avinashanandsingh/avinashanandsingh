<div
    class="min-h-screen flex items-center justify-center bg-linear-to-br from-purple-50 via-fuchsia-50 to-amber-50 p-6">

    <div
        class="w-full max-w-md bg-white/60 backdrop-blur-xl border border-white/40 p-8 rounded-3xl shadow-2xl shadow-purple-100">

        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-tr from-purple-200 to-amber-200 rounded-2xl mb-4 shadow-inner">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-purple-600" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                </svg>
            </div>
            <h2 class="text-3xl font-bold text-purple-950">Forgot Password?</h2>
            <p class="text-purple-900/60 mt-2">No worries, we'll send you reset instructions.</p>
        </div>

        <form class="space-y-6" [formGroup]="form">
            <div>
                <label for="email" class="block text-sm font-semibold text-purple-900 mb-2 ml-1">Email Address</label>
                <input id="email" type="email" formControlName="email" placeholder="name@company.com" class="input" />

                <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
                  validation: 'required',
                  message: 'Email address is required',
                  control: form.controls['email']
                }">
                </ng-container>
                <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
                  validation: 'email',
                  message: 'Invalid email address',
                  control: form.controls['email']
                }">
                </ng-container>
            </div>

            <button (click)="onSubmit()"
                class="w-full py-3.5 bg-linear-to-r from-purple-600 to-purple-500 hover:from-purple-500 hover:to-purple-400 text-white font-bold rounded-xl shadow-lg shadow-purple-200 transition-all transform hover:-translate-y-0.5 active:scale-[0.98]">
                Reset Password
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="#"
                class="text-sm font-semibold text-purple-700 hover:text-amber-600 transition-colors inline-flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Back to log in
            </a>
        </div>
    </div>
</div>

<ng-template #formError let-control="control" let-message="message" let-validation="validation">
    @if(control.hasError(validation) && (control.dirty || control.touched)) {
    <ng-container>
        <div class="fv-plugins-message-container">
            <div class="fv-help-block mt-1">
                <span class="error">
                    {{ message }}
                </span>
            </div>
        </div>
    </ng-container>
    }
</ng-template>
<loader [isOpen]="loaderDialog"></loader>
