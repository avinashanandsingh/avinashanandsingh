<div class="flex flex-row">
    <select class="select" (change)="change($event,'HH')" [disabled]="disabled">
        <option value="">HH</option>
        @for(h of hours; track h){

        @if(hour && h===hour){
        <option [value]="h" selected>{{h.toString().padStart(2, "0")}}</option>
        }
        @if(hour && h!==hour){
        <option [value]="h">{{h.toString().padStart(2, "0")}}</option>
        }
        @if(hour === undefined){
        <option [value]="h">{{h.toString().padStart(2, "0")}}</option>
        }
        }
    </select>
     <select class="select"  (change)="change($event,'MM')"  [disabled]="disabled">
    <option value="">MM</option>
    @for(m of minutes; track m){
        @if(minute && m=== minute){
         <option [value]="m" selected>{{m.toString().padStart(2, "0")}}</option>
        }
        @if(minute && m!== minute){
         <option [value]="m">{{m.toString().padStart(2, "0")}}</option>
        }
     @if(minute === undefined){
         <option [value]="m">{{m.toString().padStart(2, "0")}}</option>
        }
      

}
  </select>
</div>
