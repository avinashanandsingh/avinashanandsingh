<nav 
  class="bg-white shadow-md sticky top-0 z-50 transition-all duration-300"
  (keydown)="handleKeyDown($event)"
>
  <div class="w-full mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-end items-center h-16">
      <!-- Desktop Navigation -->
      <div *ngIf="!isMobile()" class="hidden lg:flex items-center space-x-6">
       
        <!-- User Avatar Dropdown -->
        <div class="relative">
          <button 
            (click)="handleToggleMenu()"
            class="flex items-center space-x-2 focus:outline-none"
          >
            <img 
              [src]="user().avatar" 
              [alt]="user().name" 
              class="w-10 h-10 rounded-full border-2 border-purple-500 hover:border-purple-600 transition"
            />
          </button>

          <!-- Dropdown Menu -->
          <div *ngIf="isMenuOpen()" class="absolute right-0 mt-2 w-48 bg-white rounded-md shadow-lg py-1 z-50" [class.hidden]="!isMenuOpen()">
            <button 
              (click)="handleDialog()" 
              class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 focus:outline-none"
            >
            <div class="flex flex-row gap-1">
              <i class="bi bi-key"></i>
              <span>Change Password</span>
            </div>              
            </button>
            <button 
              (click)="handleLogout()" 
              class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 focus:outline-none"
            >
              🚪 Logout
            </button>
          </div>
        </div>
      </div>

      <!-- Mobile Hamburger -->
      <button (click)="handleToggleMenu()" class="lg:hidden p-2 text-gray-600">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>

      <!-- Mobile Overlay Dropdown -->
      <div *ngIf="isMobile() && isMenuOpen()" class="fixed inset-0 bg-black/50 z-40" (click)="handleCloseMenu()"></div>
      <div *ngIf="isMobile() && isMenuOpen()" class="fixed inset-x-0 top-16 bg-white p-4" [style.height.px]="'calc(100% - 4rem)'">
        <button (click)="handleCloseMenu()" class="w-full text-left px-4 py-2 text-gray-700 hover:bg-gray-50 rounded mb-2">Settings</button>
        <button (click)="handleLogout()" class="w-full text-left px-4 py-2 text-gray-700 hover:bg-gray-50 rounded">Logout</button>
      </div>
    </div>
  </div>
</nav>
