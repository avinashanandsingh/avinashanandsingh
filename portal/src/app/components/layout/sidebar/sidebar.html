<div class="h-full flex flex-col shadow-2xl  transition-transform duration-300 ease-in-out transform">
    <aside

        <div class="h-15 flex items-center px-6 shadow-sm">
            <div class="text-2xl font-bold text-purple-700">
                <img src="images/logo.png" alt="Logo" class="w-8 h-8 inline-block mr-2">
            </div>
        </div>
        <!-- Menu Area -->
        <div class="h-screen overflow-y-auto">
            <nav class="flex-1 py-3 px-3 space-y-0">

                    class="side-bar-item">

                <a [routerLink]="['/schedules']" [class.side-bar-item-active]="isLinkActive('/schedules')"
                    class="side-bar-item">
                    <i class="bi bi-calendar-event"></i>

                <a [routerLink]="['/modules']" [class.side-bar-item-active]="isLinkActive('/modules')"
                    class="side-bar-item">
                    <i class="bi bi-diagram-2-fill"></i>

                        </g>
                    </svg>
                    Meditations
                </a>
                <a [routerLink]="['/resources']" [class.side-bar-item-active]="isLinkActive('/resources')"
                    class="side-bar-item">
                    <i class="bi bi-boxes"></i>
                    Resources
                </a>
                <a [routerLink]="['/scare-vibes']" [class.side-bar-item-active]="isLinkActive('/scare-vibes')"
                    class="side-bar-item">
                    <i class="bi bi-soundwave"></i>
                    Scared Vibes
                </a>
                <a [routerLink]="['/shorts']" [class.side-bar-item-active]="isLinkActive('/shorts')"
                    class="side-bar-item">
                    <i class="bi bi-file-earmark-play"></i>
                    Shorts
                </a>
                <a [routerLink]="['/services']" [class.side-bar-item-active]="isLinkActive('/services')"
                    class="side-bar-item">
                    <i class="bi bi-upc-scan"></i>
                    Aura Services
                </a>
                <a [routerLink]="['/branding']" [class.side-bar-item-active]="isLinkActive('/branding')"
                    class="side-bar-item">
                    <i class="bi bi-highlighter"></i>
                    Branding
                </a>
                <a [routerLink]="['/referrals']" [class.side-bar-item-active]="isLinkActive('/referrals')"
                    class="side-bar-item">
                    <i class="bi bi-share"></i>
                    Referrals
                </a>
                <a [routerLink]="['/orders']" [class.side-bar-item-active]="isLinkActive('/orders')"
                    class="side-bar-item">
                    <i class="bi bi-credit-card-2-front"></i>
                    Payment History
                </a>
                <a [routerLink]="['/inquiries']" [class.side-bar-item-active]="isLinkActive('/inquiries')"
                    class="side-bar-item">
                    <i class="bi bi-box"></i>
                    Inquiries
                </a>
                <div class="pt-4 pb-2 px-4">
                    <p class="text-xs font-bold text-purple-300 uppercase tracking-widest">Settings</p>
                </div>
                <a [routerLink]="['/smtp']" [class.side-bar-item-active]="isLinkActive('/smtp')"
                    class="side-bar-item">
                    <i class="bi bi-gear"></i>
                    Smtp
                </a>
                <a [routerLink]="['/templates']" [class.side-bar-item-active]="isLinkActive('/templates')"
                    class="side-bar-item">
                    <i class="bi bi-file-earmark-richtext"></i>
                    Templates
                </a>
                <a [routerLink]="['/pages']" [class.side-bar-item-active]="isLinkActive('/pages')"
                    class="side-bar-item">
                    <i class="bi bi-file-text"></i>
                    Pages
                </a>
                <a [routerLink]="['/users']" [class.side-bar-item-active]="isLinkActive('/users')"
                    class="side-bar-item">
                    <i class="bi bi-people"></i>
                    Users
                </a>

    </aside>
</div>
