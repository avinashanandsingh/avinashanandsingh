<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden p-3 sm:p-3">    
    <!-- Header -->
    <div class="text-center items-center justify-center mb-3">
      <img src="images/signin.png"/>
      <h1 class="text-3xl font-extrabold bg-clip-text text-purple-900 tracking-tight">
        Welcome Back
      </h1>
      <p class="mt-2 text-purple-700 text-sm">Sign in to continue</p>
    </div>
    <div class="pt-10 pb-6 px-4 md:px-8">     
      <!-- Form Container -->
      <form [formGroup]="form" class="space-y-6 mb-3">

        <!-- Username -->
        <div class="space-y-2">
          <label for="username"
            class="block text-base uppercase font-medium text-purple-900 ml-1 tracking-wide">Username</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
              </svg>
            </div>
            <input id="username" type="text" formControlName="username" placeholder="USERNAME"
              class="pl-10 block w-full px-2 py-2 border border-gray-300 rounded-lg text-gray-900 placeholder-gray-400 bg-white focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all"
              [class.opacity-50]="isLoading()" />
              
          </div>
          <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
                  validation: 'required',
                  message: 'Username is required',
                  control: form.controls['username']
                }">
            </ng-container>
        </div>


        <!-- Password Input -->
        <div class="space-y-2">
          <div class="flex justify-between items-center">
            <label for="password"
              class="block text-base uppercase font-medium text-purple-900 tracking-wide">Password</label>
            <a [routerLink]="['/forgot']" class="text-sm uppercase font-medium text-purple-600 hover:text-purple-500 transition-colors">Forgot password?</a>
          </div>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
              </svg>
            </div>
            <input id="password" [type]="showPassword() ? 'text': 'password'" formControlName="password" placeholder="PASSWORD"
              class="block text-base w-full pl-10 px-2 py-2 border border-gray-300 rounded-lg text-gray-900 placeholder-gray-400 bg-white focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all"
              [class.opacity-50]="isLoading()" />
              <button type="button" (click)="showPassword.set(!showPassword())"
            class="absolute right-3 top-3 text-gray-400 hover:text-gray-600">
            @if(showPassword()){
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eye"
              viewBox="0 0 16 16">
              <path
                d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z" />
              <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0" />
            </svg>
            }
            @else {
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eye-slash"
              viewBox="0 0 16 16">
              <path
                d="M13.359 11.238C15.06 9.72 16 8 16 8s-3-5.5-8-5.5a7 7 0 0 0-2.79.588l.77.771A6 6 0 0 1 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755q-.247.248-.517.486z" />
              <path
                d="M11.297 9.176a3.5 3.5 0 0 0-4.474-4.474l.823.823a2.5 2.5 0 0 1 2.829 2.829zm-2.943 1.299.822.822a3.5 3.5 0 0 1-4.474-4.474l.823.823a2.5 2.5 0 0 0 2.829 2.829" />
              <path
                d="M3.35 5.47q-.27.24-.518.487A13 13 0 0 0 1.172 8l.195.288c.335.48.83 1.12 1.465 1.755C4.121 11.332 5.881 12.5 8 12.5c.716 0 1.39-.133 2.02-.36l.77.772A7 7 0 0 1 8 13.5C3 13.5 0 8 0 8s.939-1.721 2.641-3.238l.708.709zm10.296 8.884-12-12 .708-.708 12 12z" />
            </svg>
            }
          </button>
          </div>
          <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
                  validation: 'required',
                  message: 'Password is required',
                  control: form.controls['password']
                }">
            </ng-container>
        </div>

        <!-- Remember Me -->
        <!-- <div class="flex items-center space-x-3">
        <input 
          type="checkbox" 
          id="remember"
          [(ngModel)]="rememberMe()"
        />
        <label for="remember" class="text-sm text-purple-100 cursor-pointer">Remember me</label>
      </div> -->

        <!-- Error Message (Conditional) -->
        <!-- <div *ngIf="errorMessage()" class="text-red-300 text-xs text-center font-medium bg-red-500/10 p-2 rounded border border-red-500/20">
        {{ errorMessage() }}
      </div> -->

        <!-- Primary Button -->
        <div>
          <button [disabled]="isLoading()" (click)="submit($event)" class="btn-primary">

            @if(isLoading()){
            <svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
              </path>
            </svg>
            }
            @if(!isLoading()){
            <span>Sign In</span>
            }
            @else {
            <span>Signing in...</span>
            }
          </button>
        </div>
        <!-- Secondary Action: Google Sign In -->

        <div class="absolute inset-0 flex items-center" aria-hidden="true">
          <div class="w-full border-t border-white/10"></div>

        <div class="relative flex justify-center text-sm">
          <span class="px-2 bg-transparent text-purple-200/60">Or continue with</span>
        </div>
      </div> -->

        <span class="font-semibold tracking-wide">Sign in with Google</span>
      </button> -->
      </form>
      <!-- Footer -->
      <div class="bg-gray-50 px-8 py-3 border-t border-gray-100 flex flex-col items-center">
        <p class="text-center text-base text-gray-500">
          No account?
          <a href="/signup" class="font-medium text-purple-600 hover:text-purple-500 transition-colors ml-1">Sign Up</a>
        </p>
      </div>
    </div>
  </div>

</div>
<ng-template #formError let-control="control" let-message="message" let-validation="validation">
    @if(control.hasError(validation) && (control.dirty || control.touched)) {
    <ng-container>
        <div class="fv-plugins-message-container">
            <div class="fv-help-block mt-1">
                <span class="error">
                    {{ message }}
                </span>
            </div>
        </div>
    </ng-container>
    }
</ng-template>
<loader [isOpen]="isLoading"></loader>
