<div class="relative w-full bg-white">
  <!-- Header -->
  <div class="mb-6 text-center">
    <h2 class="text-3xl font-bold text-gray-900 mb-2">Popular Courses</h2>
    <p class="text-gray-500">Explore our top-rated courses</p>
  </div>

  <!-- Carousel Container -->
  <div 
    class="relative overflow-hidden"
    data-carousel
    (mouseenter)="handleMouseEnter()"
    (mouseleave)="handleMouseLeave()"
  >
    <!-- Track Container -->
    <div 
      class="flex transition-transform duration-500 ease-in-out"
      [style.transform]="'translateX(-' + (this.currentIndex() * 100) + '%)'"
    >
      <!-- Course Cards -->
      <div *ngFor="let course of courses()" class="min-w-full">
        <!-- Card Component -->
        <div class="bg-white rounded-xl overflow-hidden shadow-lg border border-gray-100 h-full">
          <!-- Thumbnail -->
          <div class="relative h-48 overflow-hidden">
            <img [src]="course.image" [alt]="course.title" class="w-full h-full object-cover transform transition-transform duration-300 hover:scale-110" />
            <div class="absolute top-3 right-3 bg-white px-2 py-1 rounded-md text-xs font-bold text-gray-700 shadow">
              {{ course.rating }} ⭐
            </div>
          </div>
          
          <!-- Content -->
          <div class="p-5">
            <h3 class="text-lg font-bold text-gray-900 mb-2 truncate">{{ course.title }}</h3>
            <p class="text-sm text-gray-500 mb-4">By {{ course.instructor }}</p>
            
            <div class="flex justify-between items-center text-sm text-gray-500 mb-4">
              <span class="font-medium">{{ course.students }} Students</span>
              <span>Free Preview</span>
            </div>
            
            <div class="flex justify-between items-center pt-4 border-t border-gray-100">
              <span class="text-xl font-bold text-purple-600">{{ course.price }}</span>
              <button class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                Enroll
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Scroll Buttons -->
    <div class="absolute top-1/2 transform -translate-y-1/2 -left-4 flex items-center z-10">
      <button (click)="prev()" class="p-3 bg-white rounded-full shadow-lg border border-gray-200 hover:bg-gray-50 text-gray-600 transition-colors">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </button>
    </div>
    <div class="absolute top-1/2 transform -translate-y-1/2 right-4 flex items-center z-10">
      <button (click)="next()" class="p-3 bg-white rounded-full shadow-lg border border-gray-200 hover:bg-gray-50 text-gray-600 transition-colors">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      </button>
    </div>

    <!-- Pagination Dots -->
    <div class="absolute bottom-4 left-1/2 transform -translate-x-1/2 flex space-x-2 z-10">
      <div *ngFor="let course of courses(); let i = index" 
           [ngClass]="{
             'w-8 h-2 bg-purple-600 rounded-full': currentIndex() === i,
             'w-2 h-2 bg-gray-300 rounded-full': currentIndex() !== i
           }"
      ></div>
    </div>
  </div>

  <!-- View All Button -->
  <div class="text-center mt-6">
    <button (click)="goToSlide(0)" class="text-purple-600 font-medium hover:text-purple-700 transition-colors">
      View All Courses →
    </button>
  </div>
</div>
