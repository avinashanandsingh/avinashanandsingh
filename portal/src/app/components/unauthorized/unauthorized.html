<!-- 1. Background Layer -->
<!-- Using the same deep purple gradient to maintain theme consistency -->
<div class="min-h-screen w-full flex flex-col items-center justify-center relative overflow-hidden bg-gradient-to-br from-indigo-950 via-purple-900 to-violet-950">
  
  <!-- Animated Background Elements -->
  <!-- Creating a "blocked" atmosphere with subtle gradients -->
  <div class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-rose-500/20 rounded-full blur-[120px] animate-pulse"></div>
  <div class="absolute bottom-[-10%] right-[-5%] w-[40%] h-[40%] bg-purple-500/20 rounded-full blur-[100px]"></div>
  
  <!-- 2. Error Card Container -->
  <!-- Glassmorphism effect: dark transparent background with blur -->
  <div class="relative z-10 w-full max-w-md p-8 md:p-12 flex flex-col items-center text-center">
    
    <!-- Icon Wrapper -->
    <div class="mb-6 relative">
      <!-- SVG Shield Icon -->
      <svg 
        class="w-20 h-20 text-white drop-shadow-lg relative" 
        viewBox="0 0 24 24" 
        fill="none" 
        stroke="currentColor" 
        stroke-width="1.5"
        xmlns="http://www.w3.org/2000/svg"
      >
        <!-- Shield Background -->
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="url(#grad1)" />
        
        <!-- Exclamation / Alert -->
        <path d="M10 8l6 4M10 16l6-4" stroke="url(#grad2)" stroke-width="2" />
        <defs>
          <linearGradient id="grad1" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#FACC15" /> <!-- Golden Yellow -->
            <stop offset="100%" stop-color="#E2E8F0" /> <!-- White -->
          </linearGradient>
          <linearGradient id="grad2" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#FACC15" />
            <stop offset="100%" stop-color="#fff" />
          </linearGradient>
        </defs>
      </svg>
    </div>

    <!-- 3. Title & Status -->
    <h1 class="text-4xl font-bold text-white mb-2 tracking-tight">
      {{ title }}
    </h1>
    
    <!-- Status Code Badge -->
    <span class="inline-block px-4 py-1 mb-6 text-xs font-bold uppercase tracking-widest bg-yellow-400/10 text-yellow-400 rounded-full border border-yellow-500/20">
      {{ status }}
    </span>

    <!-- 4. Message Text -->
    <div class="space-y-4 text-left">
      <p class="text-lg font-medium text-gray-100 leading-relaxed">
        {{ message }}
      </p>
      <p class="text-sm text-purple-200/60 leading-relaxed">
        {{ instruction }}
      </p>
    </div>

    <!-- 5. Call to Action Button -->
    <div class="mt-10 w-full">
      <a 
        href="{{ redirectUrl }}"
        class="group relative w-full flex justify-center py-4 px-4 overflow-hidden rounded-xl text-white bg-gradient-to-r from-yellow-400 via-yellow-500 to-amber-500 shadow-lg shadow-yellow-500/20 hover:shadow-yellow-500/40 hover:scale-[1.02] active:scale-[0.98] transition-all duration-300"
      >
        <!-- Background Gradient Effect -->
        <div class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-yellow-400/80 to-transparent -translate-x-full group-hover:animate-shimmer"></div>
        
        <!-- Content -->
        <div class="relative z-10 flex items-center gap-3 font-bold tracking-wide text-lg">
          <!-- Back Arrow Icon -->
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
          </svg>
          <span>Return to Sign In</span>
        </div>
      </a>
    </div>

    <!-- Optional: Contact Support -->
    <div class="mt-8 text-center">
      <a href="mailto:support@example.com" class="text-xs font-medium text-purple-300 hover:text-yellow-300 transition-colors flex items-center justify-center gap-1">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
        Contact Support
      </a>
    </div>
  </div>
</div>
