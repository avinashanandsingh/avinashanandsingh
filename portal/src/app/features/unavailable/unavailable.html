<!-- Main Container -->
<div class="min-h-screen bg-slate-50 flex flex-col font-sans text-slate-900">

    <!-- Navbar (Placeholder) -->

        <div>            
            <button class="text-slate-500 hover:text-slate-800 text-sm font-medium px-3 py-2">Documentation</button>

    <!-- CONTENT HERO SECTION -->
    <main class="grow flex items-center justify-center relative overflow-hidden px-4">

        <!-- Decorative background blobs -->
        <div
            class="absolute top-0 left-0 w-96 h-96 bg-indigo-100 rounded-full mix-blend-multiply filter blur-3xl opacity-70 -translate-x-1/2 -translate-y-1/2">
        </div>
        <div
            class="absolute bottom-0 right-0 w-96 h-96 bg-pink-100 rounded-full mix-blend-multiply filter blur-3xl opacity-70 translate-x-1/2 translate-y-1/2">
        </div>

        <!-- Hero Card -->
        <div
            class="relative z-10 max-w-3xl w-full  p-8 md:p-12 text-center">

            <!-- Animated Error Icon -->
            <div class="mb-6 flex justify-center">
                <!-- SVG Icon for Server Offline -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-24 w-24 text-slate-800" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636" />
                </svg>
            </div>

            <!-- Title -->
            <h1 class="text-3xl md:text-4xl font-extrabold text-red-700 mb-2">
                Oops! Something went sideways.
            </h1>

            <!-- Subtitle -->
            <p class="text-slate-600 text-lg mb-8 leading-relaxed">
                Our servers are taking a quick breather.<br/>We’re already on the case and hope to have things running smoothly again shortly.<br/>We sincerely apologize for the hiccup!
            </p>            

        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 py-6">
        <div class="max-w-7xl mx-auto px-4 text-center text-slate-400 text-sm">
            <p>&copy; {{year}} Ashavin Anand Singh. All rights reserved.</p>
        </div>
    </footer>
