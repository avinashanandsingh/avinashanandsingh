<div class="p-6 bg-white space-y-3 rounded min-h-screen">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <div>
            <h2 class="text-2xl font-bold text-gray-800">Enrollments</h2>
            <p class="text-sm text-gray-500">Manage entrollments here</p>
        </div>       
    </div>


    <!-- Listing Table -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left text-base text-gray-600">
                <thead class="bg-gray-50 text-base uppercase text-gray-500 border-b border-gray-100">
                    <tr>
                        <th class="px-6 py-4 font-semibold">Schedule</th>
                        <th class="py-4 font-semibold  text-start">Enrolled&nbsp;Date</th>
                        <th class="py-4 font-semibold  text-start">Completed&nbsp;Date</th>
                        <th class="py-4 font-semibold  text-start">Certified Date</th>
                        <th class="py-4 font-semibold  text-start">Dropped By</th>
                        <th class="py-4 font-semibold  text-start">Dropped Date</th>
                        <th class="py-4 font-semibold  text-start">Notes</th>
                        <th class="py-4 font-semibold  text-start">Status</th>
                        <th class="py-4 font-semibold">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    
                </tbody>
            </table>
        </div>
    </div>
</div>
<loader [isOpen]="loader"></loader>
