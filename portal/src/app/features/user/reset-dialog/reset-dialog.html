<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="bg-white rounded-lg shadow-xl w-full max-w-md mx-4">

        <!-- Header -->
        <div class="flex justify-between items-center px-6 py-4 border-b border-gray-100">
            <h2 class="text-xl font-semibold text-gray-800">Reset Password</h2>
            <button (click)="isOpen = false" class="text-gray-400 hover:text-gray-600 p-1">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Body -->
        <div class="p-6">
            <p class="text-gray-600 mb-4">
                Send password reset email to <span class="font-medium">{{ user?.email }}</span>
            </p>

            <!-- Email Verification -->
            <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-4">
                <p class="text-sm text-blue-800">
                    <svg class="w-5 h-5 inline-block mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    A password reset link will be sent to their email address.
                </p>
            </div>

            <!-- Notes -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Notes (Optional)</label>
                <textarea name="notes" rows="2"
                    class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500"
                    placeholder="Add any additional notes..."></textarea>
            </div>
        </div>

        <!-- Footer -->
        <div class="flex justify-end space-x-2 p-6 bg-gray-50 border-t border-gray-100 rounded-b-lg">
            <button (click)="isOpen = false" class="btn btn-secondary">
                Cancel
            </button>
            <button (click)="resetPassword()" class="btn btn-primary">
                Send Reset Link
            </button>
        </div>
    </div>
</div>
