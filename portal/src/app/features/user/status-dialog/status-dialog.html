<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
      <div class="bg-white rounded-lg shadow-xl w-full max-w-md mx-4">
        
        <!-- Header -->
        <div class="flex justify-between items-center px-6 py-4 border-b border-gray-100">
          <h2 class="text-xl font-semibold text-gray-800">Change Status</h2>
          <button 
            (click)="isOpen = false"
            class="text-gray-400 hover:text-gray-600 p-1"
          >
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>

        <!-- Body -->
        <div class="p-6">
          <p class="text-gray-600 mb-4">
            Change the status of <span class="font-medium">{{ user?.first_name }} {{ user?.last_name }}</span>
          </p>

          <!-- Status Options -->
          <div class="space-y-3 mb-6">
            <label class="flex items-center space-x-3 p-3 border border-gray-200 rounded-lg cursor-pointer hover:border-blue-500 transition">
              <input 
                type="radio" 
                [value]="'active'"             
                class="h-4 w-4 text-blue-600 focus:ring-blue-500"
              />
              <span class="flex items-center space-x-2">
                <span class="w-2 h-2 rounded-full bg-green-500"></span>
                <span class="text-green-600 font-medium">Active</span>
              </span>
            </label>

            <label class="flex items-center space-x-3 p-3 border border-gray-200 rounded-lg cursor-pointer hover:border-blue-500 transition">
              <input 
                type="radio" 
                [value]="'inactive'"
              
                class="h-4 w-4 text-blue-600 focus:ring-blue-500"
              />
              <span class="flex items-center space-x-2">
                <span class="w-2 h-2 rounded-full bg-red-500"></span>
                <span class="text-red-600 font-medium">Inactive</span>
              </span>
            </label>

            <label class="flex items-center space-x-3 p-3 border border-gray-200 rounded-lg cursor-pointer hover:border-blue-500 transition">
              <input 
                type="radio" 
                [value]="'pending'"
              
                class="h-4 w-4 text-blue-600 focus:ring-blue-500"
              />
              <span class="flex items-center space-x-2">
                <span class="w-2 h-2 rounded-full bg-yellow-500"></span>
                <span class="text-yellow-600 font-medium">Pending</span>
              </span>
            </label>
          </div>

          <!-- Reason -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Reason for Change</label>
            <textarea               
              name="reason"
              rows="3"
              class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500"
              placeholder="Explain the reason for this status change..."
            ></textarea>
          </div>
        </div>

        <!-- Footer -->
        <div class="flex justify-end space-x-2 p-6 bg-gray-50 border-t border-gray-100 rounded-b-lg">
          <button 
            (click)="isOpen = false"
            class="btn btn-secondary"
          >
            Cancel
          </button>
          <button 
            (click)="confirmChangeStatus()"
            class="btn btn-primary"
          >
            Confirm Change
          </button>
        </div>
      </div>
    </div>
