<div class="p-6 bg-white space-y-3 rounded min-h-screen">

    <!-- Header -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-800">Profile</h1>
            <p class="text-gray-500 text-sm">Manage your profile here</p>
        </div>
        <div>
            <button (click)="save()" class="btn btn-primary text-base">
                <span>Save Changes</span>
            </button>
        </div>
    </div>
    <form [formGroup]="form">
    <div class="py-6 flex flex-col md:flex-row gap-3">
        <div class="flex-1 upload">

            <div class="relative w-44 h-44 cursor-pointer rounded-full" (click)="upload?.click()">
                @if(!user()?.avatar){
                <img class="pen" alt="pen" src="images/pen.svg">
                }
                @if(user()?.avatar){
                @if(!blobUrl()){
                <img [src]="user()?.avatar" class="w-full" alt="Background">
                }
                @if(blobUrl()){
                <img [src]="blobUrl()" class="w-full" alt="Background">
                }
                <div class="absolute bottom-8 right-8 items-center justify-center">
                    <span class="bg-purple-100 text-purple-900 px-2 py-1 rounded-full text-sm">
                        <i class="bi bi-pencil"></i>
                    </span>
                </div>
                }
            </div>

            <input type="file" hidden #upload (change)="select($event)" onclick="this.value=null;" accept="image/*"
                name="file" />
            <span class="mt-2 text-sm text-gray-500">All image types are allowed!</span>
        </div>
        <div class="flex-1">
            <input type="hidden" formControlName="role" />
        <input type="hidden" formControlName="id" />
         <div title="First Name" class="mb-3 flex-1 w-full">
                <label for="first_name" class="block text-base font-medium text-gray-700 mb-2">First Name <span
                        class="text-red-500">*</span></label>
                <input type="text" id="first_name" formControlName="first_name" class="input" />
                <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
                  validation: 'required',
                  message: 'First Name is required',
                  control: form.controls['first_name']
                }">
                </ng-container>
            </div>
            <div title="Last Name" class="mb-3 flex-1 w-full">
                <label for="last_name" class="block text-base font-medium text-gray-700 mb-2">Last Name <span
                        class="text-red-500">*</span></label>
                <input type="text" id="last_name" formControlName="last_name" class="input" />
                <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
                  validation: 'required',
                  message: 'Last Name is required',
                  control: form.controls['last_name']
                }">
                </ng-container>
            </div>
        <div class="flex flex-col md:flex-row gap-3 w-full">
           
            
        </div>
        
        </div>
    </div>
    
        <div class="flex flex-col md:flex-row gap-3 w-full">
            <div title="Email Address" class="mb-3 flex-1 w-full">
                <label for="email" class="block text-base font-medium text-gray-700 mb-2">Email Address <span
                        class="text-red-500">*</span></label>
                <input type="email" id="email" formControlName="email" class="input" />
                <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
                  validation: 'required',
                  message: 'Email Address is required',
                  control: form.controls['email']
                }">
                </ng-container>
            </div>
            <div title="Phone" class="mb-3 flex-1 w-full">
                <label for="email" class="block text-base font-medium text-gray-700 mb-2">Phone <span
                        class="text-red-500">*</span></label>
                <input type="phone" id="phone" formControlName="phone" class="input" />
                <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
                  validation: 'required',
                  message: 'Phone is required',
                  control: form.controls['phone']
                }">
                </ng-container>
                <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
                  validation: 'pattern',
                  message: 'Invalid phone, it should start with +',
                  control: form.controls['phone']
                }">
                </ng-container>
            </div>
        </div>
        <div class="flex flex-col md:flex-row gap-3 w-full mb-3">
            <div title="Country" class="w-full">
                <span class="block text-base font-medium text-gray-700 mb-2">Country</span>
                <input type="hidden" formControlName="countryid"/>
                <app-lov [items]="country_list()" [config]="{ minLength: 5, placeholder:'Select a Country', showImage: false }" (selected)="countryHandler($event!)" [itemId]="country_id()"></app-lov>
            </div>
            <div title="State" class="w-full">
                <span class="block text-base font-medium text-gray-700 mb-2">State</span>
                <input type="hidden" formControlName="stateid"/>
                <app-lov [items]="state_list()" [config]="{ minLength: 5, placeholder:'Select a State', showImage: false }" (selected)="stateHandler($event!)" [itemId]="stateId()"></app-lov>
            </div>
            <div title="City" class="w-full">
                <span class="block text-base font-medium text-gray-700 mb-2">City</span>
                <input type="hidden" formControlName="cityid"/>
                <app-lov [items]="city_list()" [config]="{ minLength: 5, placeholder:'Select a City', showImage: false }" (selected)="cityHandler($event!)" [itemId]="cityId()"></app-lov>
            </div>
        </div>
        <div title="Profession" class="mb-3">
            <label for="profession" class="block text-base font-medium text-gray-700 mb-2">Profession</label>
            <input type="text" id="profession" formControlName="profession" class="input" />
        </div>
        <div title="Income" class="mb-3">
            <label for="income" class="block text-base font-medium text-gray-700 mb-2">Income</label>
            <input type="text" inputmode="numeric" id="income" formControlName="income" class="input" />
            <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
                  validation: 'pattern',
                  message: 'Income must be a numerical figure',
                  control: form.controls['income']
                }">
            </ng-container>
        </div>
    </form>
</div>

<ng-template #formError let-control="control" let-message="message" let-validation="validation">
    @if(control.hasError(validation) && (control.dirty || control.touched)) {
    <ng-container>
        <div class="fv-plugins-message-container">
            <div class="fv-help-block mt-1">
                <span class="error">
                    {{ message }}
                </span>
            </div>
        </div>
    </ng-container>
    }
</ng-template>
<loader [isOpen]="loader"></loader>
