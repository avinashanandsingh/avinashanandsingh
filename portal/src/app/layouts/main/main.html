<!-- Full Height Layout Container -->
<div class="flex h-screen">

    <!-- 1. Sidebar Area -->
    
    <!-- Import or Paste SidebarComponent Content Here -->
     @if(isSidebarOpen){
        <app-sidebar></app-sidebar>
     }
    

    <!-- 2. Main Content Column (Header, Content, Footer) -->
    <div class="flex flex-col flex-1 min-w-0 overflow-hidden">
        <!-- Header Component -->
        <app-header [isSidebarOpen]="isMobile" (toggle)="toggleSidebar()" [pageTitle]="pageTitle()"></app-header>
        


        <!-- Content Area (Router Outlet) -->
        <main class="flex-1 overflow-y-auto relative scroll-smooth">
            <div class="p-6 md:p-5">
                <router-outlet></router-outlet>
            </div>
        </main>

        <!-- Footer Component -->
        <footer
            class="h-15 md:h-14 shrink-0 bg-white backdrop-blur-md border-t border-white/10 flex flex-col md:flex-row gap-1 items-center justify-between px-6 py-2 md:py-0 text-sm text-purple-700">
            <div class="flex items-center gap-2">
                <svg class="w-4 h-4 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
                <span>&copy; {{year}} ORXUS. All rights reserved.</span>
            </div>
            <div class="flex gap-4">
                <a href="/privacy" class="transition-colors">Privacy</a>
                <a href="/terms" class="transition-colors">Terms</a>
                <a href="/support" class="transition-colors">Support</a>
            </div>
        </footer>

    </div>
</div>
